<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Wallpaper Roll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="grain"></div>

  <header class="topbar">
    <button class="brand" id="homeBtn" type="button">
      <span class="brand-mark">●</span>
      <span class="brand-text">WALLPAPER ROLL</span>
    </button>
    <div class="crumb" id="crumb"></div>
  </header>

  <!-- ===== HOME: category cards ===== -->
  <section class="view" id="homeView">
    <div class="home-wrap">
      <h1 class="home-title">Pick a set</h1>
      <p class="home-sub">Every wallpaper in the repo, sorted by where it goes.</p>
      <div class="cards" id="cards"><!-- cards injected --></div>
    </div>
  </section>

  <!-- ===== GRID: thumbnails for selected category ===== -->
  <section class="view" id="gridView" hidden>
    <div class="grid-wrap">
      <div class="grid-head">
        <button class="back-btn" id="backBtn" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 4l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
        <h2 class="grid-title" id="gridTitle">—</h2>
        <span class="grid-count" id="gridCount">0 wallpapers</span>
      </div>
      <div class="thumb-grid" id="thumbGrid"><!-- thumbs injected --></div>
    </div>
  </section>

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-blur" id="lightboxBlur"></div>

    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous wallpaper">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 4l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <figure class="lb-frame" id="lbFrame">
      <img id="lbImage" alt="" draggable="false" />
      <figcaption class="lb-caption" id="lbCaption"></figcaption>
      <a class="lb-download" id="lbDownload" href="#" download title="Download" aria-label="Download this wallpaper">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4v11m0 0l-4-4m4 4l4-4M5 19h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Download</span>
      </a>
    </figure>

    <button class="lb-nav lb-next" id="lbNext" aria-label="Next wallpaper">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M9 4l8 8-8 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="lb-hint">Tap outside the image to close</div>
  </div>

  <script src="assets/manifest.js"></script>
  <script src="script.js"></script>
</body>
</html>
